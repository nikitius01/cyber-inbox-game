services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: cyber
      POSTGRES_PASSWORD: cyber
      POSTGRES_DB: cybersecurity_game
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    image: golang:1.22
    working_dir: /app/backend
    command: go run ./cmd/server
    volumes:
      - .:/app
    environment:
      SERVER_ADDR: :8080
      FRONTEND_ORIGIN: http://localhost:5173
      JWT_SECRET: dev-change-me-long-random-secret
      DATABASE_URL: postgres://cyber:cyber@postgres:5432/cybersecurity_game?sslmode=disable
      AI_API_KEY: ${AI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1/chat/completions}
      AI_MODEL: ${AI_MODEL:-gpt-4.1-mini}
      ENABLE_DEV_USER_LIST: ${ENABLE_DEV_USER_LIST:-true}
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  frontend:
    image: node:22
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev"
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
